<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f45"/>
      <stop offset="100%" style="stop-color:#0a152e"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="115"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Subtle blue radial glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="55%">
    <stop offset="0%" style="stop-color:#18b8ff;stop-opacity:0.13"/>
    <stop offset="100%" style="stop-color:#18b8ff;stop-opacity:0"/>
  </radialGradient>
  <rect width="512" height="512" rx="115" fill="url(#glow)"/>
  <!-- Top highlight -->
  <rect x="80" y="0" width="352" height="2" rx="1" fill="rgba(255,255,255,0.10)"/>
  <!-- Team logo centered — loaded from URL -->
  <image href="https://quixilver8404.org/logo_old5.png" x="80" y="80" width="352" height="352" clip-path="url(#rounded)"/>
</svg>